<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fastn — Flow Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Theme init — runs before paint to avoid flash -->
  <script>
    (function(){
      var p=new URLSearchParams(window.location.search),t=p.get("theme");
      var s=localStorage.getItem("fastn-theme");
      if(s) t=s;
      if(t==="light"||(t!=="dark"&&window.matchMedia("(prefers-color-scheme: light)").matches)){
        document.documentElement.classList.add("light");
      }else{
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            fastn: {
              bg:           'rgb(var(--fastn-bg) / <alpha-value>)',
              surface:      'rgb(var(--fastn-surface) / <alpha-value>)',
              'surface-sel':'rgb(var(--fastn-surface-sel) / <alpha-value>)',
              border:       'rgb(var(--fastn-border) / <alpha-value>)',
              'border-hi':  'rgb(var(--fastn-border-hi) / <alpha-value>)',
              accent:       '#4F3FFF',
              'accent-hover':'#3B2DE8',
              heading:      'rgb(var(--fastn-heading) / <alpha-value>)',
              body:         'rgb(var(--fastn-body) / <alpha-value>)',
              muted:        'rgb(var(--fastn-muted) / <alpha-value>)',
              check:        'rgb(var(--fastn-check) / <alpha-value>)',
              icon:         'rgb(var(--fastn-icon) / <alpha-value>)',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* ── Product UI — Dark Mode (Warm Dark) ── */
    :root {
      --fastn-bg:          26 25 24;    /* #1A1918 */
      --fastn-surface:     34 33 32;    /* #222120 */
      --fastn-surface-sel: 39 38 34;    /* #272622 */
      --fastn-border:      43 42 39;    /* #2B2A27 */
      --fastn-border-hi:   62 61 56;    /* #3E3D38 */
      --fastn-heading:     227 225 218; /* #E3E1DA */
      --fastn-body:        145 143 134; /* #918F86 */
      --fastn-muted:       96 94 86;    /* #605E56 */
      --fastn-check:       168 166 158; /* #A8A69E */
      --fastn-icon:        128 126 117; /* #807E75 */
    }
    /* ── Product UI — Light Mode (Claude-inspired warm) ── */
    :root.light {
      --fastn-bg:          250 249 247; /* #FAF9F7 */
      --fastn-surface:     255 255 255; /* #FFFFFF */
      --fastn-surface-sel: 245 244 240; /* #F5F4F0 */
      --fastn-border:      232 229 222; /* #E8E5DE */
      --fastn-border-hi:   212 208 200; /* #D4D0C8 */
      --fastn-heading:     26 24 22;    /* #1A1816 */
      --fastn-body:        111 107 102; /* #6F6B66 */
      --fastn-muted:       168 164 157; /* #A8A49D */
      --fastn-check:       61 59 55;    /* #3D3B37 */
      --fastn-icon:        138 134 128; /* #8A8680 */
    }

    body { font-family: 'Inter', sans-serif; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgb(var(--fastn-border-hi)); border-radius: 3px; }
    @keyframes pulse-dot {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    .loading-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .backdrop-animate { animation: fade-in 0.2s ease-out; }
    .card-animate { animation: slide-up 0.3s ease-out forwards; }
    /* Theme toggle */
    #toggle-knob { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    :root.light #toggle-knob { transform: translateX(20px); }
    #theme-toggle .icon-moon { display: block; }
    #theme-toggle .icon-sun { display: none; }
    :root.light #theme-toggle .icon-moon { display: none; }
    :root.light #theme-toggle .icon-sun { display: block; }
    /* Plan panel — slides open from right */
    #plan-panel { width: 0; min-width: 0; opacity: 0; overflow: hidden; transition: width 0.3s ease, min-width 0.3s ease, opacity 0.2s ease; }
    #plan-panel.plan-panel-open { width: 380px; min-width: 380px; opacity: 1; }
    #popup-card { transition: width 0.3s ease, left 0.3s ease; }
  </style>

<body>

  <!-- Backdrop — lighter overlay in light mode, heavier in dark -->
  <div class="backdrop-animate fixed inset-0 bg-black/40 dark:bg-black/70">

    <!-- Popup Card — positioned absolutely, JS sets left/top/width/height -->
    <div id="popup-card" class="card-animate bg-fastn-bg border border-fastn-border rounded-2xl shadow-2xl flex flex-col overflow-hidden absolute">

      <!-- Header / Drag Handle -->
      <header id="drag-handle" class="flex items-center justify-between px-5 py-3 border-b border-fastn-border shrink-0 cursor-move select-none">
        <div class="flex items-center gap-2 pointer-events-none">
          <svg class="h-5 w-5 text-fastn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span class="text-fastn-heading font-semibold text-sm">Flow Builder</span>
        </div>
        <div class="flex items-center gap-1.5 pointer-events-auto">
          <!-- Theme Toggle -->
          <button id="theme-toggle" class="relative w-11 h-6 rounded-full bg-fastn-surface border border-fastn-border hover:border-fastn-border-hi transition-colors" title="Toggle theme">
            <span id="toggle-knob" class="absolute top-[2px] left-[2px] h-5 w-5 rounded-full bg-fastn-heading shadow-sm flex items-center justify-center">
              <svg class="icon-moon h-3 w-3 text-fastn-bg" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
              </svg>
              <svg class="icon-sun h-3 w-3 text-fastn-bg" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
              </svg>
            </span>
          </button>
          <!-- Close -->
          <button
            id="close-btn"
            class="text-fastn-muted hover:text-fastn-heading transition-colors p-1 rounded-lg hover:bg-fastn-surface"
            title="Close"
          >
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Content: horizontal split -->
      <div class="flex flex-1 min-h-0 overflow-hidden">
        <!-- Left: Chat + Options + Input -->
        <div class="flex flex-col flex-1 min-w-0">
          <main id="chat-area" class="flex-1 overflow-y-auto chat-scroll px-5 py-4 space-y-4">
            <div id="empty-state" class="flex h-full items-center justify-center">
              <div class="text-center space-y-2">
                <p class="text-fastn-muted text-sm">Describe the automation you want to build</p>
              </div>
            </div>
          </main>
          <div id="options-area" class="hidden px-5 pb-3 shrink-0 max-h-[45vh] overflow-y-auto chat-scroll"></div>
          <footer class="px-5 py-3 border-t border-fastn-border shrink-0 space-y-2">
            <form id="input-form" class="flex items-center gap-2">
              <input
                id="input-field"
                type="text"
                placeholder="Describe your flow..."
                autocomplete="off"
                class="flex-1 bg-fastn-surface border border-fastn-border rounded-lg px-4 py-2.5 text-sm text-fastn-heading placeholder-fastn-muted focus:outline-none focus:border-fastn-border-hi focus:ring-1 focus:ring-fastn-border-hi/30 transition-colors"
              />
              <button
                id="send-btn"
                type="submit"
                class="bg-fastn-accent hover:bg-fastn-accent-hover text-white rounded-lg p-2.5 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                disabled
              >
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                </svg>
              </button>
            </form>
            <div class="flex items-center justify-center gap-1.5">
              <span class="text-fastn-muted text-[10px]">Powered by</span>
              <a href="https://fastn.ai" target="_blank" class="text-fastn-icon text-[10px] font-semibold hover:text-fastn-heading transition-colors">Fastn Connect Kit</a>
            </div>
          </footer>
        </div>
        <!-- Right: Plan Panel -->
        <div id="plan-panel" class="flex flex-col border-l border-fastn-border bg-fastn-bg">
          <div class="flex items-center px-4 py-3 border-b border-fastn-border shrink-0">
            <svg class="h-4 w-4 text-fastn-icon mr-2 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span class="text-fastn-heading font-semibold text-sm whitespace-nowrap">Flow Plan</span>
          </div>
          <div id="plan-area" class="flex-1 overflow-y-auto chat-scroll px-4 py-3"></div>
        </div>
      </div>

      <!-- Resize Handle -->
      <div id="resize-handle" class="absolute bottom-1 right-1 w-5 h-5 cursor-nwse-resize flex items-center justify-center opacity-40 hover:opacity-80 transition-opacity" style="touch-action: none;">
        <svg class="w-3 h-3 text-fastn-muted" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="20" cy="20" r="2"/><circle cx="14" cy="20" r="2"/><circle cx="20" cy="14" r="2"/>
        </svg>
      </div>

    </div>
  </div>

  <!-- Theme toggle handler -->
  <script>
    document.getElementById("theme-toggle").addEventListener("click",function(e){
      e.stopPropagation();
      var h=document.documentElement,isL=h.classList.contains("light");
      h.classList.toggle("light",!isL);
      h.classList.toggle("dark",isL);
      localStorage.setItem("fastn-theme",isL?"dark":"light");
    });
  </script>
