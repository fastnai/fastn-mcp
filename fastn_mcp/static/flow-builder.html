<body class="dark">

  <!-- Backdrop -->
  <div class="backdrop-animate fixed inset-0 bg-black/70 flex items-center justify-center p-4">

    <!-- Popup Card -->
    <div class="card-animate bg-fastn-bg border border-fastn-border rounded-2xl shadow-2xl flex flex-col w-full max-w-lg h-[min(600px,85vh)] overflow-hidden">

      <!-- Header -->
      <header class="flex items-center justify-between px-4 py-3 border-b border-fastn-border shrink-0">
        <div class="flex items-center gap-2">
          <svg class="h-5 w-5 text-fastn-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span class="text-white font-semibold text-sm">Flow Builder</span>
        </div>
        <button
          id="close-btn"
          class="text-fastn-muted hover:text-white transition-colors p-1 rounded hover:bg-fastn-surface"
          title="Close"
        >
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </header>

      <!-- Chat Area -->
      <main id="chat-area" class="flex-1 overflow-y-auto chat-scroll px-4 py-4 space-y-4">
        <div id="empty-state" class="flex h-full items-center justify-center">
          <div class="text-center space-y-2">
            <p class="text-fastn-muted text-sm">Describe the automation you want to build</p>
          </div>
        </div>
      </main>

      <!-- Options Area -->
      <div id="options-area" class="hidden px-4 pb-2 shrink-0"></div>

      <!-- Flow Plan Area -->
      <div id="plan-area" class="hidden px-4 pb-2 shrink-0 max-h-[40vh] overflow-y-auto chat-scroll"></div>

      <!-- Input Area -->
      <footer class="px-4 py-3 border-t border-fastn-border shrink-0 space-y-2">
        <form id="input-form" class="flex items-center gap-2">
          <input
            id="input-field"
            type="text"
            placeholder="Describe your flow..."
            autocomplete="off"
            class="flex-1 bg-fastn-surface border border-fastn-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-fastn-muted focus:outline-none focus:border-fastn-accent transition-colors"
          />
          <button
            id="send-btn"
            type="submit"
            class="bg-fastn-accent hover:bg-fastn-accent-hover text-white rounded-lg p-2.5 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
            disabled
          >
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
            </svg>
          </button>
        </form>
        <div class="flex items-center justify-center gap-1.5">
          <span class="text-fastn-muted text-[10px]">Powered by</span>
          <span class="text-fastn-accent text-[10px] font-semibold">Fastn Connect Kit</span>
        </div>
      </footer>

    </div>
  </div>

</body>
</html>
